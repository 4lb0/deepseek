<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek Peak Hour Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #4d6bfe;
    --warning: #f0883e;
    --danger: #f85149;
    --success: #3fb950;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.6s ease;
  }

  body.peak { background: linear-gradient(135deg, #0d1117 0%, #1a0f0f 50%, #1d1111 100%); }
  body.offpeak { background: linear-gradient(135deg, #0d1117 0%, #0f1a0f 50%, #111d11 100%); }

  .container {
    width: 100%;
    max-width: 520px;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2rem;
    filter: drop-shadow(0 0 20px rgba(77, 107, 254, 0.3));
  }
  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, #4d6bfe, #22d3ee);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .logo-text {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4d6bfe, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  .card.peak {
    border-color: rgba(248, 81, 73, 0.4);
    box-shadow: 0 0 30px rgba(248, 81, 73, 0.1);
  }
  .card.offpeak {
    border-color: rgba(63, 185, 80, 0.4);
    box-shadow: 0 0 30px rgba(63, 185, 80, 0.1);
  }

  /* Clock */
  .clock {
    font-size: 3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    margin-bottom: 0.3rem;
  }
  .timezone {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  /* Status */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 1.2rem;
    transition: all 0.3s ease;
  }
  .status-badge.peak {
    background: rgba(248, 81, 73, 0.15);
    color: #f85149;
    border: 1px solid rgba(248, 81, 73, 0.3);
  }
  .status-badge.offpeak {
    background: rgba(63, 185, 80, 0.15);
    color: #3fb950;
    border: 1px solid rgba(63, 185, 80, 0.3);
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .status-dot.peak  { background: #f85149; }
  .status-dot.offpeak { background: #3fb950; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* Message */
  .message {
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 1.8rem;
    color: var(--text);
    min-height: 60px;
  }
  .message strong { color: var(--warning); }

  /* Peak hours bar */
  .hours-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .hour-block {
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    background: rgba(139, 148, 158, 0.08);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .hour-block.active {
    background: rgba(248, 81, 73, 0.12);
    border-color: rgba(248, 81, 73, 0.4);
    color: #f85149;
  }

  /* Countdown */
  .countdown {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  /* Link */
  .pricing-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 8px 20px;
    border: 1px solid rgba(77, 107, 254, 0.3);
    border-radius: 8px;
    transition: all 0.2s;
  }
  .pricing-link:hover {
    background: rgba(77, 107, 254, 0.1);
    border-color: rgba(77, 107, 254, 0.6);
  }
  .pricing-link svg { width: 14px; height: 14px; }

  .footer {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body class="peak">
<div class="container">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">🐋</div>
    <span class="logo-text">DeepSeek</span>
  </div>

  <!-- Main Card -->
  <div class="card peak" id="card">
    <div class="clock" id="clock">--:--</div>
    <div class="timezone">Beijing Time (UTC+8)</div>

    <div class="status-badge peak" id="badge">
      <span class="status-dot peak" id="dot"></span>
      <span id="badgeText">--</span>
    </div>

    <div class="message" id="message">--</div>

    <div class="hours-row">
      <span class="hour-block" id="block-morning">09:00 – 12:00</span>
      <span class="hour-block" id="block-afternoon">14:00 – 18:00</span>
    </div>

    <div class="countdown" id="countdown"></div>

    <a class="pricing-link" href="https://api-docs.deepseek.com/quick_start/pricing" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      View API Pricing
    </a>
  </div>

  <div class="footer">
    Peak Hours: 09:00–12:00 &amp; 14:00–18:00 (UTC+8), Mon–Fri
  </div>
</div>

<script>
(function () {
  const UTC8_OFFSET = 8 * 60; // minutes

  const $body   = document.body;
  const $card   = document.getElementById('card');
  const $clock  = document.getElementById('clock');
  const $badge  = document.getElementById('badge');
  const $dot    = document.getElementById('dot');
  const $badgeT = document.getElementById('badgeText');
  const $msg    = document.getElementById('message');
  const $bMorn  = document.getElementById('block-morning');
  const $bAft   = document.getElementById('block-afternoon');
  const $cd     = document.getElementById('countdown');

  function offset(date) {
    const local = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(),
                           date.getUTCHours(), date.getUTCMinutes(), date.getUTCSeconds());
    return new Date(local + UTC8_OFFSET * 60000);
  }

  function minutesSinceMidnight(d) {
    return d.getHours() * 60 + d.getMinutes();
  }

  // Peak windows in minutes since midnight
  const MORNING_START = 9 * 60;     // 09:00
  const MORNING_END   = 12 * 60;    // 12:00
  const AFTER_START   = 14 * 60;    // 14:00
  const AFTER_END     = 18 * 60;    // 18:00

  function isPeak(beijingDate) {
    const day = beijingDate.getDay(); // 0=Sun, 6=Sat
    if (day === 0 || day === 6) return false; // weekend: off-peak
    const m = minutesSinceMidnight(beijingDate);
    return (m >= MORNING_START && m < MORNING_END) ||
           (m >= AFTER_START   && m < AFTER_END);
  }

  function setTheme(peak) {
    const cls  = peak ? 'peak' : 'offpeak';
    const icon = peak ? '⏳' : '🚀';

    $body.className = peak ? 'peak' : 'offpeak';
    $card.className = `card ${cls}`;
    $badge.className = `status-badge ${cls}`;
    $dot.className = `status-dot ${cls}`;

    $badgeT.textContent = peak ? `${icon} Peak Hours` : `${icon} Off-Peak`;
    $msg.innerHTML = peak
      ? '<strong>⏳ DeepSeek is in peak hours right now.</strong><br>API may have higher latency. Consider lighter usage.'
      : '<strong>🚀 You&rsquo;re clear — off-peak zone.</strong><br>Go ahead and ship!';
  }

  function formatCountdown(minutes) {
    if (minutes <= 0) return '';
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h > 0) return `Next peak starts in ${h}h ${m}m`;
    return `Next peak starts in ${m}m`;
  }

  function nextPeakStart(nowM) {
    // Returns minutes until next peak start, or -1 if already in peak
    if (nowM >= MORNING_START && nowM < MORNING_END) return -1;
    if (nowM >= AFTER_START && nowM < AFTER_END) return -1;

    let target;
    if (nowM < MORNING_START) {
      target = MORNING_START;
    } else if (nowM < AFTER_START) {
      target = AFTER_START;
    } else {
      // After 18:00 — next peak is tomorrow 09:00
      target = MORNING_START + 24 * 60;
    }
    return target - nowM;
  }

  function highlightBlocks(nowM) {
    const inMorning = nowM >= MORNING_START && nowM < MORNING_END;
    const inAfter   = nowM >= AFTER_START   && nowM < AFTER_END;
    $bMorn.className = 'hour-block' + (inMorning ? ' active' : '');
    $bAft.className  = 'hour-block' + (inAfter   ? ' active' : '');
  }

  function tick() {
    const nowUTC8 = offset(new Date());
    const hh = String(nowUTC8.getHours()).padStart(2, '0');
    const mm = String(nowUTC8.getMinutes()).padStart(2, '0');
    const ss = String(nowUTC8.getSeconds()).padStart(2, '0');

    $clock.textContent = `${hh}:${mm}:${ss}`;

    const peak = isPeak(nowUTC8);
    setTheme(peak);

    const nowM = minutesSinceMidnight(nowUTC8);
    highlightBlocks(nowM);

    const mins = nextPeakStart(peak ? -1 : nowM);

    // Weekend message
    if (nowUTC8.getDay() === 0 || nowUTC8.getDay() === 6) {
      $cd.textContent = 'Weekend — all off-peak! 🎉';
    } else if (peak) {
      // Find end of current peak window
      let end;
      if (nowM >= MORNING_START && nowM < MORNING_END) end = MORNING_END;
      else end = AFTER_END;
      const remaining = end - nowM;
      $cd.textContent = remaining > 0
        ? `Peak ends in ${Math.floor(remaining / 60)}h ${remaining % 60}m`
        : '';
    } else {
      $cd.textContent = formatCountdown(mins);
    }
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
