<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek Peak Hour Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #4d6bfe;
    --warning: #f0883e;
    --red: #f85149;
    --green: #3fb950;
    --yellow: #d2991d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.6s ease;
  }

  body.peak    { background: linear-gradient(135deg, #0d1117 0%, #1a0f0f 50%, #1d1111 100%); }
  body.offpeak { background: linear-gradient(135deg, #0d1117 0%, #0f1a0f 50%, #111d11 100%); }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2rem;
    filter: drop-shadow(0 0 20px rgba(77, 107, 254, 0.3));
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #4d6bfe, #22d3ee);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text {
    font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4d6bfe, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  .card.peak    { border-color: rgba(248,81,73,0.4);  box-shadow: 0 0 30px rgba(248,81,73,0.1); }
  .card.offpeak { border-color: rgba(63,185,80,0.4);  box-shadow: 0 0 30px rgba(63,185,80,0.1); }

  /* Semaforo (Traffic Light) */
  .semaforo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .semaforo-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: #0d1117;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 14px 22px;
  }
  .semaforo-light {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #21262d;
    border: 2px solid var(--border);
    transition: all 0.4s ease;
    position: relative;
  }
  .semaforo-light.on {
    border-color: transparent;
    box-shadow: 0 0 24px;
  }
  .semaforo-light.red.on   { background: var(--red);   box-shadow: 0 0 24px var(--red), 0 0 48px rgba(248,81,73,0.4); }
  .semaforo-light.green.on { background: var(--green); box-shadow: 0 0 24px var(--green), 0 0 48px rgba(63,185,80,0.4); }

  .semaforo-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    transition: color 0.4s;
  }
  .semaforo-label.active-red   { color: var(--red); }
  .semaforo-label.active-green { color: var(--green); }

  /* Big Countdown */
  .big-countdown {
    margin-bottom: 1rem;
  }
  .big-countdown .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .big-countdown .timer {
    font-size: 2.2rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    transition: color 0.4s;
  }
  .big-countdown .timer.peak    { color: var(--red); }
  .big-countdown .timer.offpeak { color: var(--green); }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 0.8rem;
    transition: all 0.3s ease;
  }
  .status-badge.peak {
    background: rgba(248,81,73,0.15);
    color: #f85149;
    border: 1px solid rgba(248,81,73,0.3);
  }
  .status-badge.offpeak {
    background: rgba(63,185,80,0.15);
    color: #3fb950;
    border: 1px solid rgba(63,185,80,0.3);
  }

  /* Peak hours bar */
  .hours-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .hour-block {
    padding: 7px 14px;
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 500;
    background: rgba(139,148,158,0.08);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .hour-block.active {
    background: rgba(248,81,73,0.12);
    border-color: rgba(248,81,73,0.4);
    color: #f85149;
  }

  /* Pricing link */
  .pricing-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 7px 18px;
    border: 1px solid rgba(77,107,254,0.3);
    border-radius: 8px;
    transition: all 0.2s;
  }
  .pricing-link:hover {
    background: rgba(77,107,254,0.1);
    border-color: rgba(77,107,254,0.6);
  }
  .pricing-link svg { width: 14px; height: 14px; }

  .footer {
    margin-top: 1.8rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
</style>
</head>
<body class="peak">
<div class="container">

  <div class="logo">
    <div class="logo-icon">🐋</div>
    <span class="logo-text">DeepSeek</span>
  </div>

  <div class="card peak" id="card">

    <!-- Semaforo -->
    <div class="semaforo">
      <div class="semaforo-box">
        <div class="semaforo-light red"   id="light-red"></div>
        <div class="semaforo-light yellow"></div>
        <div class="semaforo-light green" id="light-green"></div>
      </div>
      <div class="semaforo-label" id="semaforo-label">--</div>
    </div>

    <!-- Big Countdown -->
    <div class="big-countdown">
      <div class="label" id="cd-label">--</div>
      <div class="timer peak" id="cd-timer">--</div>
    </div>

    <div class="status-badge peak" id="badge">
      <span id="badgeText">--</span>
    </div>

    <div class="hours-row">
      <span class="hour-block" id="block-morning">09:00 – 12:00</span>
      <span class="hour-block" id="block-afternoon">14:00 – 18:00</span>
    </div>

    <a class="pricing-link" href="https://api-docs.deepseek.com/quick_start/pricing" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View API Pricing
    </a>
  </div>

  <div class="footer">
    Peak Hours: 09:00–12:00 &amp; 14:00–18:00 (UTC+8), Mon–Fri
  </div>
</div>

<script>
(function () {
  const UTC8 = 8 * 60;
  const MS_START = 9 * 60,  MS_END = 12 * 60;
  const AS_START = 14 * 60, AS_END = 18 * 60;

  const $body   = document.body;
  const $card   = document.getElementById('card');
  const $badge  = document.getElementById('badge');
  const $badgeT = document.getElementById('badgeText');
  const $bMorn  = document.getElementById('block-morning');
  const $bAft   = document.getElementById('block-afternoon');
  const $lr     = document.getElementById('light-red');
  const $lg     = document.getElementById('light-green');
  const $semLbl = document.getElementById('semaforo-label');
  const $cdLbl  = document.getElementById('cd-label');
  const $cdTimer = document.getElementById('cd-timer');

  function beijing(date) {
    return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(),
                             date.getUTCHours(), date.getUTCMinutes(), date.getUTCSeconds()) + UTC8 * 60000);
  }

  function mins(d)   { return d.getHours() * 60 + d.getMinutes(); }
  function isWeekend(d) { const w = d.getDay(); return w === 0 || w === 6; }

  function isPeak(m, weekend) {
    if (weekend) return false;
    return (m >= MS_START && m < MS_END) || (m >= AS_START && m < AS_END);
  }

  function setTheme(peak) {
    const cls = peak ? 'peak' : 'offpeak';
    $body.className       = peak ? 'peak' : 'offpeak';
    $card.className       = 'card ' + cls;
    $badge.className      = 'status-badge ' + cls;
    $cdTimer.className    = 'timer ' + cls;

    $lr.className = 'semaforo-light red'   + (peak ? ' on' : '');
    $lg.className = 'semaforo-light green' + (!peak ? ' on' : '');

    $semLbl.textContent = peak ? 'Red Light — NO BUILD' : 'Green Light — TIME TO CODE';
    $semLbl.className   = 'semaforo-label ' + (peak ? 'active-red' : 'active-green');

    $badgeT.textContent = peak ? '🔴 Peak Hours' : '🟢 Off-Peak';
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function fmtTimer(m) {
    if (m <= 0) return '--';
    const h = Math.floor(m / 60);
    const mi = m % 60;
    if (h > 0) return `${h}h ${pad(mi)}m`;
    return `${mi}m`;
  }

  function getCountdown(nowM, peak, weekend) {
    if (weekend) return { label: '', timer: 'Weekend — off-peak! 🎉', remaining: -1 };

    if (peak) {
      let end;
      if (nowM >= MS_START && nowM < MS_END) end = MS_END;
      else end = AS_END;
      const r = end - nowM;
      return {
        label: 'Off-Peak starts in',
        timer: fmtTimer(r),
        remaining: r
      };
    } else {
      let target, tag;
      if (nowM < MS_START)      { target = MS_START;  tag = '(morning session)'; }
      else if (nowM < AS_START) { target = AS_START;  tag = '(afternoon session)'; }
      else                       { target = MS_START + 24 * 60; tag = '(tomorrow)'; }
      const r = target - nowM;
      return {
        label: `Next peak ${tag}`,
        timer: fmtTimer(r),
        remaining: r
      };
    }
  }

  function tick() {
    const bj = beijing(new Date());

    const weekend = isWeekend(bj);
    const nowM = mins(bj);
    const peak = isPeak(nowM, weekend);

    setTheme(peak);

    // Highlight active peak block
    const inMorn = nowM >= MS_START && nowM < MS_END;
    const inAft  = nowM >= AS_START && nowM < AS_END;
    $bMorn.className = 'hour-block' + (inMorn && !weekend ? ' active' : '');
    $bAft.className  = 'hour-block' + (inAft  && !weekend ? ' active' : '');

    const cd = getCountdown(nowM, peak && !weekend, weekend);
    $cdLbl.textContent   = cd.label;
    $cdTimer.textContent = cd.timer;
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
